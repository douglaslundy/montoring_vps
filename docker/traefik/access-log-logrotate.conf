# Rotação do access log do Traefik (JSON) usado pelo VPS Monitor.
#
# O VPS Monitor apenas LÊ este arquivo (montado read-only no container
# monitor-backend); ele não controla o Traefik nem seu volume. Este arquivo
# de configuração deve ser instalado no HOST onde o Traefik roda (não faz
# parte da stack docker-compose deste repositório).
#
# Instalação (no host, fora deste repo):
#   1. Copie este arquivo para /etc/logrotate.d/traefik-access-log
#   2. Ajuste o caminho abaixo se o arquivo real do access log do Traefik
#      estiver em outro local dentro do volume `traefik_access_logs`.
#   3. Teste sem aplicar: logrotate -d /etc/logrotate.d/traefik-access-log
#   4. logrotate já roda via cron/systemd timer padrão do sistema
#      (normalmente diário) — nenhuma configuração adicional é necessária.
#
# Retenção: 15 dias (rotaciona 1x por dia, mantém as 15 rotações mais
# recentes, comprime as antigas para economizar espaço).

/var/log/traefik/access.log {
    daily
    rotate 15
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
